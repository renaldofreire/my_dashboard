<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — charisrv</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <span class="site-title">charisrv / dashboard</span>
    <span class="clock" id="clock"></span>
  </header>

  <main>

    <!-- Row 1: Bitcoin + Câmbio -->
    <section class="row">
      <div class="card" id="bitcoin-card"
           hx-get="/api/bitcoin"
           hx-trigger="load, every 300s"
           hx-swap="innerHTML">
        <span class="loading">carregando bitcoin…</span>
      </div>

      <div class="card" id="exchange-card"
           hx-get="/api/exchange"
           hx-trigger="load, every 300s"
           hx-swap="innerHTML">
        <span class="loading">carregando câmbio…</span>
      </div>
    </section>

    <!-- Row 2: Clima -->
    <section class="row full">
      <div class="card" id="weather-card"
           hx-get="/api/weather?city=fortaleza"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando clima…</span>
      </div>
    </section>

    <!-- Row 3: GitHub -->
    <section class="row full">
      <div class="card" id="github-card"
           hx-get="/api/github"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando github…</span>
      </div>
    </section>

    <!-- Row 4: Hacker News -->
    <section class="row full">
      <div class="card" id="hn-card"
           hx-get="/api/hackernews"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando hacker news…</span>
      </div>
    </section>

  </main>

  <script>
    // Relógio em tempo real
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Renderiza JSON das APIs como HTML nos cards
    document.body.addEventListener("htmx:afterRequest", function(evt) {
      const el   = evt.detail.elt;
      const id   = el.id;

      try {
        const data = JSON.parse(evt.detail.xhr.responseText);

        // --- Bitcoin ---
        if (id === "bitcoin-card") {
          el.innerHTML = data.error
            ? `<span class="error">Bitcoin indisponível</span>`
            : `<div class="card-label">Bitcoin</div>
               <div class="card-value">$ ${data.usd.toLocaleString("en-US")}</div>
               <div class="card-sub">USD</div>`;
        }

        // --- Câmbio ---
        if (id === "exchange-card") {
          el.innerHTML = data.error
            ? `<span class="error">Câmbio indisponível</span>`
            : `<div class="card-label">Câmbio</div>
               <div class="rate-row">
                 <span class="rate-pair">USD → BRL</span>
                 <span class="rate-val">R$ ${data.usd_brl.toFixed(2)}</span>
               </div>
               <div class="rate-row">
                 <span class="rate-pair">GBP → BRL</span>
                 <span class="rate-val">R$ ${data.gbp_brl.toFixed(2)}</span>
               </div>`;
        }

        // --- Clima ---
        if (id === "weather-card") {
          if (data.error) {
            el.innerHTML = `<span class="error">Clima indisponível</span>`;
            return;
          }
          const rainBadge = data.will_rain
            ? `<span class="badge badge-rain">🌧 vai chover hoje</span>`
            : `<span class="badge badge-clear">☀ sem chuva prevista</span>`;

          el.innerHTML = `
            <div class="weather-header">
              <div>
                <div class="card-label">Clima</div>
                <div class="weather-city-row">
                  <span class="weather-city" id="weather-city-label">${data.city}</span>
                  <button class="city-toggle" id="city-toggle-btn" onclick="toggleCity()">
                    trocar cidade
                  </button>
                </div>
              </div>
              ${rainBadge}
            </div>
            <div class="weather-body">
              <div class="weather-temp">${data.temp}°C</div>
              <div class="weather-desc">${data.description}</div>
              <div class="weather-range">↑ ${data.temp_max}° ↓ ${data.temp_min}°</div>
            </div>
            <div class="weather-footer">
              Prob. chuva: ${data.precip_prob ?? "—"}% · Precip. atual: ${data.precip} mm
            </div>`;
        }

        // --- GitHub ---
        if (id === "github-card") {
          if (data.error || !data.events.length) {
            el.innerHTML = `<span class="error">GitHub indisponível</span>`;
            return;
          }
          const items = data.events.map(e =>
            `<a class="gh-item" href="${e.url}" target="_blank">
               <span class="gh-type">${e.type}</span>
               <span class="gh-repo">${e.repo}</span>
               <span class="gh-detail">${e.detail}</span>
             </a>`
          ).join("");
          el.innerHTML = `
            <div class="card-label">GitHub — ${data.username}</div>
            ${items}`;
        }

        // --- Hacker News ---
        if (id === "hn-card") {
          const items = data.stories.map((s, i) =>
            `<a class="hn-item" href="${s.url || 'https://news.ycombinator.com/item?id=' + s.id}" target="_blank">
               <span class="hn-rank">${i + 1}</span>
               <span class="hn-title">${s.title}</span>
               <span class="hn-score">▲ ${s.score}</span>
             </a>`
          ).join("");
          el.innerHTML = `<div class="card-label">Hacker News</div>${items}`;
        }

      } catch (e) {
        // erro de parse — ignora silenciosamente
      }
    });

    // Toggle Fortaleza / Maracanaú
    let currentCity = "fortaleza";

    function toggleCity() {
      currentCity = currentCity === "fortaleza" ? "maracanau" : "fortaleza";
      const card = document.getElementById("weather-card");
      card.setAttribute("hx-get", `/api/weather?city=${currentCity}`);
      card.innerHTML = `<span class="loading">carregando clima…</span>`;
      htmx.trigger(card, "load");
    }
  </script>
</body>
</html>
