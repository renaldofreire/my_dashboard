<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — charisrv</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <span class="site-title">charisrv / dashboard</span>
    <div class="gshock-clock">
      <div class="gshock-bezel">
        <div class="gshock-display">
          <div class="gshock-top">
            <span id="gshock-day">FRI</span>
            <span id="gshock-date">08.05</span>
          </div>
          <div class="gshock-main" id="clock">00:00:00</div>
        </div>
      </div>
    </div>
  </header>

  <main>

    <!-- Row 1: Finanças + Clima -->
    <section class="row">
      <div class="card" id="finances-card"
           hx-get="/api/finances"
           hx-trigger="load, every 300s"
           hx-swap="innerHTML">
        <span class="loading">carregando finanças…</span>
      </div>

      <div class="card" id="weather-card"
           hx-get="/api/weather?city=fortaleza"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando clima…</span>
      </div>
    </section>

    <!-- Row 2: GitHub -->
    <section class="row full">
      <div class="card" id="github-card"
           hx-get="/api/github"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando github…</span>
      </div>
    </section>

    <!-- Row 4: Hacker News -->
    <section class="row full">
      <div class="card" id="hn-card"
           hx-get="/api/hackernews"
           hx-trigger="load, every 600s"
           hx-swap="innerHTML">
        <span class="loading">carregando hacker news…</span>
      </div>
    </section>

  </main>

  <footer>
    Feito com algumas xícaras de café, by Renaldo Freire
    <svg class="coffee-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
      <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
      <line x1="6" y1="1" x2="6" y2="4"></line>
      <line x1="10" y1="1" x2="10" y2="4"></line>
      <line x1="14" y1="1" x2="14" y2="4"></line>
    </svg>
  </footer>

  <script>
    // ── Relógio (G-SHOCK Style) ─────────────────────────
    function updateClock() {
      const now = new Date();
      
      // Hora principal (24h)
      document.getElementById("clock").textContent =
        now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
      
      // Data (DD.MM)
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      document.getElementById("gshock-date").textContent = `${day}.${month}`;
      
      // Dia da semana (em inglês para o visual clássico)
      const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      document.getElementById("gshock-day").textContent = days[now.getDay()];
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Render: Clima ─────────────────────────────────────
    function renderWeather(el, data) {
      if (data.error) {
        el.innerHTML = `<span class="error">Clima indisponível</span>`;
        return;
      }
      const rainBadge = data.will_rain
        ? `<span class="badge badge-rain">🌧 vai chover hoje</span>`
        : `<span class="badge badge-clear">☀ sem chuva prevista</span>`;

      const nextCity  = currentCity === "fortaleza" ? "Maracanaú" : "Fortaleza";

      el.innerHTML = `
        <div class="weather-header">
          <div>
            <div class="card-label">Clima</div>
            <div class="weather-city-row">
              <span class="weather-city">${data.city}</span>
              <button class="city-toggle" onclick="toggleCity()">
                ver ${nextCity}
              </button>
            </div>
          </div>
          ${rainBadge}
        </div>
        <div class="weather-body">
          <div class="weather-temp">${data.temp}°C</div>
          <div class="weather-desc">${data.description}</div>
          <div class="weather-range">↑ ${data.temp_max}° ↓ ${data.temp_min}°</div>
        </div>
        <div class="weather-footer">
          Prob. chuva: ${data.precip_prob ?? "—"}% · Precip. atual: ${data.precip} mm
        </div>`;
    }

    // ── Toggle cidade (fetch direto, sem HTMX) ────────────
    let currentCity = "fortaleza";

    async function toggleCity() {
      currentCity = currentCity === "fortaleza" ? "maracanau" : "fortaleza";
      const card = document.getElementById("weather-card");
      card.innerHTML = `<span class="loading">carregando clima…</span>`;
      try {
        const r    = await fetch(`/api/weather?city=${currentCity}`);
        const data = await r.json();
        renderWeather(card, data);
      } catch (e) {
        card.innerHTML = `<span class="error">Clima indisponível</span>`;
      }
    }

    // ── HTMX: renderiza respostas JSON como HTML ──────────
    document.body.addEventListener("htmx:afterRequest", function(evt) {
      const el  = evt.detail.elt;
      const id  = el.id;

      try {
        const data = JSON.parse(evt.detail.xhr.responseText);

        if (id === "finances-card") {
          const btc = data.bitcoin;
          const xch = data.exchange;

          let html = `<div class="card-label">Finanças</div>`;
          
          // Bitcoin section
          if (btc.error) {
            html += `<span class="error">Bitcoin indisponível</span>`;
          } else {
            html += `
              <div class="finance-section">
                <div class="card-value">$ ${btc.usd.toLocaleString("en-US")}</div>
                <div class="card-sub">BITCOIN (USD)</div>
              </div>`;
          }

          // Exchange section
          if (xch.error) {
            html += `<hr class="card-sep"><span class="error">Câmbio indisponível</span>`;
          } else {
            html += `
              <hr class="card-sep">
              <div class="rate-row">
                <span class="rate-pair">USD → BRL</span>
                <span class="rate-val">R$ ${xch.usd_brl.toFixed(2)}</span>
              </div>
              <div class="rate-row">
                <span class="rate-pair">GBP → BRL</span>
                <span class="rate-val">R$ ${xch.gbp_brl.toFixed(2)}</span>
              </div>`;
          }
          el.innerHTML = html;
        }

        if (id === "weather-card") {
          renderWeather(el, data);
        }

        if (id === "github-card") {
          if (data.error || !data.events.length) {
            el.innerHTML = `<span class="error">GitHub indisponível</span>`;
            return;
          }
          const items = data.events.map(e =>
            `<a class="gh-item" href="${e.url}" target="_blank">
               <span class="gh-type">${e.type}</span>
               <span class="gh-repo">${e.repo}</span>
               <span class="gh-detail">${e.detail}</span>
             </a>`
          ).join("");
          el.innerHTML = `<div class="card-label">GitHub — ${data.username}</div>${items}`;
        }

        if (id === "hn-card") {
          const items = data.stories.map((s, i) =>
            `<a class="hn-item" href="${s.url || 'https://news.ycombinator.com/item?id=' + s.id}" target="_blank">
               <span class="hn-rank">${i + 1}</span>
               <span class="hn-title">${s.title}</span>
               <span class="hn-score">▲ ${s.score}</span>
             </a>`
          ).join("");
          el.innerHTML = `<div class="card-label">Hacker News</div>${items}`;
        }

      } catch (e) {
        // erro de parse — ignora silenciosamente
      }
    });
  </script>
</body>
</html>
